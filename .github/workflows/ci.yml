name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install public package dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy pyarrow scikit-learn lightgbm plotly dash dash-cytoscape pytest
      - name: Compile source and scripts
        run: python -m compileall -q src scripts examples || true
      - name: Run public synthetic demo
        run: python examples/synthetic_demo/run_synthetic_demo.py
      - name: Check no forbidden public data paths are tracked
        run: python scripts/release_git_preflight.py --check-only
