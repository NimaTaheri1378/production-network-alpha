name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile package
        run: python -m compileall -q src scripts
      - name: Import package
        run: PYTHONPATH=src python -c "import production_network_alpha; print(production_network_alpha.__version__)"
